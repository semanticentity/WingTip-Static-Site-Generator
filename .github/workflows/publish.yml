name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install build
          python -m build

      - name: Cold-install smoke test
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/wingtip --version
          mkdir -p /tmp/fixture/docs
          printf '# Fixture\n\nSmoke test.\n' > /tmp/fixture/README.md
          printf '# Guide\n\nContent.\n' > /tmp/fixture/docs/guide.md
          /tmp/smoke/bin/wingtip --source /tmp/fixture --output /tmp/fixture-site
          test -f /tmp/fixture-site/index.html
          test -f /tmp/fixture-site/sitemap.xml
          test -f /tmp/fixture-site/llms.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
