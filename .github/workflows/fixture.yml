name: Fixture Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install hatch
      run: pip install hatch

    - name: Build wheel
      run: hatch build -t wheel

    - name: Create fixture project
      run: |
        mkdir -p /tmp/fixture_project/docs/guides
        cd /tmp/fixture_project
        echo "# Acme API" > README.md
        # Exercise GFM constructs the generator transforms: task lists,
        # alerts, strikethrough, autolinks, tables, and code fences.
        printf '%s\n' \
          "# Install" \
          "" \
          "Get it from https://example.com/releases and read ~~the old guide~~ the new one." \
          "" \
          "> [!NOTE]" \
          "> Works offline." \
          "" \
          "- [x] download" \
          "- [ ] configure" \
          "" \
          "| OS | Supported |" \
          "| --- | --- |" \
          "| Linux | yes |" \
          "" \
          '```python' \
          "# a comment" \
          "print('hello')" \
          '```' > docs/install.md
        echo "# Nested Guide" > docs/guides/setup.md

        # Install the wheel
        pip install $GITHUB_WORKSPACE/dist/*.whl

        # Run wingtip
        wingtip > build_output.log 2>&1

        cat build_output.log

        # Assert no warnings in build output
        if grep -qi "warning" build_output.log; then echo "Warnings found in build output!"; exit 1; fi

        # Assert expected assets are present
        if [ ! -f docs/site/static/css/custom.css ]; then echo "Missing custom.css"; exit 1; fi
        if [ ! -f docs/site/static/css/admonitions.css ]; then echo "Missing admonitions.css"; exit 1; fi
        if [ ! -f docs/site/static/js/search.js ]; then echo "Missing search.js"; exit 1; fi

        # Audit the build for missing local files and CDN regressions
        python $GITHUB_WORKSPACE/audit_site.py --output docs/site

        echo "Fixture tests passed."

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Accessibility gate (axe-core)
      run: |
        # Install where the script lives so node resolves the modules
        cd $GITHUB_WORKSPACE
        npm install --no-save playwright axe-core
        npx playwright install --with-deps chromium
        cd /tmp/fixture_project
        node $GITHUB_WORKSPACE/audit_a11y.js --output docs/site

        # Negative test: the gate must fail on a deliberately inaccessible page
        cp docs/site/index.html docs/site/_a11y_negative.html
        printf '<input type="text">' >> docs/site/_a11y_negative.html
        if node $GITHUB_WORKSPACE/audit_a11y.js --output docs/site; then
          echo "A11y audit did not fail on a deliberately broken page"
          exit 1
        fi
        rm docs/site/_a11y_negative.html

    - name: Audit negative test
      run: |
        cd /tmp/fixture_project
        # The audit must fail on a deliberately broken build
        echo '<link rel="stylesheet" href="missing-negative-test.css">' >> docs/site/index.html
        if python $GITHUB_WORKSPACE/audit_site.py --output docs/site; then
          echo "Audit did not fail on a deliberately broken build"
          exit 1
        fi
