name: Fixture Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install hatch
      run: pip install hatch

    - name: Build wheel
      run: hatch build -t wheel

    - name: Create fixture project
      run: |
        mkdir -p /tmp/fixture_project/docs
        cd /tmp/fixture_project
        echo "# Acme API" > README.md
        echo "# Install" > docs/install.md

        # Install the wheel
        pip install $GITHUB_WORKSPACE/dist/*.whl

        # Run wingtip
        wingtip > build_output.log 2>&1

        cat build_output.log

        # Assert no warnings in build output
        if grep -qi "warning" build_output.log; then echo "Warnings found in build output!"; exit 1; fi

        # Assert expected assets are present
        if [ ! -f docs/site/static/css/custom.css ]; then echo "Missing custom.css"; exit 1; fi
        if [ ! -f docs/site/static/css/admonitions.css ]; then echo "Missing admonitions.css"; exit 1; fi
        if [ ! -f docs/site/static/js/search.js ]; then echo "Missing search.js"; exit 1; fi

        # Audit the build for missing local files and CDN regressions
        python $GITHUB_WORKSPACE/audit_site.py --output docs/site

        # Negative test: the audit must fail on a deliberately broken build
        echo '<link rel="stylesheet" href="missing-negative-test.css">' >> docs/site/index.html
        if python $GITHUB_WORKSPACE/audit_site.py --output docs/site; then
          echo "Audit did not fail on a deliberately broken build"
          exit 1
        fi

        echo "Fixture tests passed."
